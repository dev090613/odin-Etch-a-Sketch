<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin: Etch a Sketch</title>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="header">
      <h1 class="title">Etch-a-Sketch</h1>
    </header>
    <main class="main">
      <div class="control-panel">
        <button class="btn" data-mode="color">Color mode</button>
        <button class="btn" data-mode="rainbow">Rainbow mode</button>
        <button class="btn" data-mode="eraser">Eraser</button>
        <button class="btn" data-mode="clear">Clear</button>
      </div>
      <div class="sketchpad"></div>
    </main>
    <footer class="footer">
      
    </footer>
  </body>
</html>
